<!DOCTYPE html>
<html lang="so">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IoT Live Dashboard</title>
    <script src="https://tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white min-h-screen flex flex-col items-center justify-center p-6">

    <div class="text-center mb-8">
        <h1 class="text-4xl font-bold text-teal-400 mb-2">📊 Live IoT Dashboard</h1>
        <p class="text-gray-400">Xogta tooska ah ee ka timaada Sensor-ka Virtual-ka ah</p>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 w-full max-w-2xl">
        <div class="bg-gray-800 p-6 rounded-2xl shadow-xl border border-gray-700 flex flex-col items-center">
            <span class="text-5xl mb-2">🌡️</span>
            <h2 class="text-xl font-semibold text-gray-400">Kulaylka (Temperature)</h2>
            <p id="temp-val" class="text-5xl font-extrabold text-orange-500 mt-2">-- °C</p>
        </div>

        <div class="bg-gray-800 p-6 rounded-2xl shadow-xl border border-gray-700 flex flex-col items-center">
            <span class="text-5xl mb-2">💧</span>
            <h2 class="text-xl font-semibold text-gray-400">Qoyaanka (Humidity)</h2>
            <p id="hum-val" class="text-5xl font-extrabold text-blue-500 mt-2">-- %</p>
        </div>
    </div>

    <p id="time-val" class="text-sm text-gray-500 mt-6">Raadinaya xogta cusub...</p>

    <script>
        const supabaseUrl = "https://supabase.co";
        const supabaseKey = "sb_publishable_eDskTzDraePwlaXa5Y3z5Q_fUe4O-Lk";

        async function fetchIoTData() {
            try {
                const response = await fetch(supabaseUrl, {
                    method: 'GET',
                    headers: {
                        'apikey': supabaseKey,
                        'Authorization': `Bearer ${supabaseKey}`
                    }
                });
                const data = await response.json();
                if (data && data.length > 0) {
                    const latest = data[0];
                    document.getElementById('temp-val').innerText = `${latest.temperature} °C`;
                    document.getElementById('hum-val').innerText = `${latest.humidity} %`;
                    const time = new Date(latest.created_at).toLocaleTimeString();
                    document.getElementById('time-val').innerText = `Xogta ugu dambeysay: ${time}`;
                } else {
                    document.getElementById('time-val').innerText = "Database-ku waa maran yahay.";
                }
            } catch (error) {
                console.error("Cillad:", error);
                document.getElementById('time-val').innerText = "Waa la waayay xogta internet-ka.";
            }
        }
        fetchIoTData();
        setInterval(fetchIoTData, 5000);
    </script>
</body>
</html>
